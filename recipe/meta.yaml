{% set name = "emmet-api" %}
{% set version = "0.86.3" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: ea9d20c746177ea5c011bb9a5baea31cb911520a09ee768854caf5c574032629

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
  run:
    - boto3
    - emmet-core
    - fastapi
    - gunicorn
    - maggma
    - python >={{ python_min }}
    - uvicorn
    - pydantic
    - asgi-logger
    - ddtrace
    - shapely
    - setproctitle
    - pymatgen-analysis-alloys
    - pymatgen-analysis-defects

test:
  imports:
    - emmet.api
    - emmet.api.core
  commands:
    # - pip check
  requires:
    # - pip
    - python {{ python_min }}

about:
  home: https://github.com/materialsproject/emmet
  summary: Emmet API Library
  license: BSD-3-Clause
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
